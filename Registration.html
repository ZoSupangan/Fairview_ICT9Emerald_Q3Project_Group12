<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background-image: url("https://giffiles.alphacoders.com/215/215732.gif"); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: rgb(255, 255, 255);
            
        }

        .form-container {
            background: rgba(70, 70, 70, 0.26);
            padding: 30px;
            border-radius: 10px;
            max-width: 800px;
            width: 100%;
        }

        #preview {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            display: none;
            border: 2px solid #ddd;
        }


        /* thing to remove white bar???? */
html, body {
    height: 100%;
    margin: 0; /* removes default white margin */
    display: flex;
    flex-direction: column;
}

main {
    flex: 1; /* pushes footer down */
}

footer {
    background-color: #212529; /* dark footer */
    color: white;
    text-align: center;
    padding: 10px 0;
}




    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <!-- Logo and yknw -->
            <a class="navbar-brand d-flex align-items-center" href="#">
  <img src="Lunarcycle.png" alt="Lunar Taxi Cycle Logo" style="height:80px; margin-right: 10px;">
  <span class="fs-5">Lunar Taxi Cycle</span>
</a>
            
            <!-- Toggle button for mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
                    data-bs-target="#navbarNav" aria-controls="navbarNav" 
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Nav links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="Fare Matrix.html">Fare Matrix</a></li>
                    <li class="nav-item"><a class="nav-link" href="schedule.html">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="help.html">Help</a></li>
                </ul>
                <a href="registration.html" class="btn btn-primary">Create Account</a>
            </div>
        </div>
    </nav>

    <!-- Registration Form -->
    <div class="d-flex justify-content-center align-items-center h-100">
        <div class="form-container shadow">

            <h3 class="text-center mb-3">REGISTRATION</h3>

            <div class="row">
                <div class="col-md-8">
                    <form id="regForm">

                        <div class="mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Contact Number</label>
                            <input type="text" class="form-control" required pattern="[0-9]+" maxlength="15">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Gender (optional)</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" required>
                            <label class="form-check-label">
                                I agree to the Terms of Use and Privacy Policy
                            </label>
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn" style="background-color: #ffc107; color: black;">Create my account</button>
                            <button type="button" class="btn btn-secondary">Cancel</button>
                        </div>

                    </form>
                </div>

                <div class="col-md-4 text-center">
                    <label class="form-label">Upload Photo</label>
                    <input type="file" class="form-control" id="photoInput" accept="image/*">
                    <img id="preview" class="mt-3">
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<!-- Footer -->
<footer class="bg-dark text-white text-center py-3 mt-5">
    <div class="container">
        <p class="mb-1">Created by: Zackery And Marcus, 9 Emerald</p>
        <p class="mb-0">Source: 
            <a href="https://www.metrolinemap.com/metro/manila/" target="_blank" class="text-warning text-decoration-none">
                Metro Manila Rail Transit Map
            </a>
        </p>
    </div>
</footer>


<script>
    document.addEventListener("DOMContentLoaded", function () {
        // Image preview
        const photoInput = document.getElementById("photoInput");
        const preview = document.getElementById("preview");

        photoInput.addEventListener("change", function() {
            const file = this.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }
        });

        const regForm = document.getElementById("regForm");
        const cancelBtn = document.querySelector(".btn.btn-secondary");

        regForm.addEventListener("submit", function(e) {
            e.preventDefault();
            // Redirect to confirmation page instead of alert
            window.location.href = "confirmation.html";
        });

        cancelBtn.addEventListener("click", function () {
            regForm.reset();
            preview.style.display = "none";
        });
    });
</script>

</body>
